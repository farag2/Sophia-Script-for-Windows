name: Download cursors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-save:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Download cursors
        run: |
          . "Scripts\Cursors.ps1"

      - name: Commit and push changes
        run: |
          # Save w11-cursor-concept-free.zip to Cursors folder
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add Cursors/w11-cursor-concept-free.zip
          git commit -m "Update w11-cursor-concept-free.zip archive"
          git push
